<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <style>
      .title { font: bold 18px sans-serif; fill: #2d3748; }
      .sub { font: 12px sans-serif; fill: #718096; }
      .box-text { font: bold 14px sans-serif; fill: #ffffff; }
      .tech-text { font: 11px monospace; fill: #e2e8f0; }
      .label { font: italic 11px sans-serif; fill: #4a5568; }
      .bg-box { stroke: #cbd5e0; stroke-width: 1; fill: #ffffff; }
      .arrow { stroke: #4a5568; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568" />
    </marker>
  </defs>

  <rect width="900" height="600" fill="#f7fafc" rx="10"/>
  <text x="20" y="30" class="title">Arquitectura Fullstack TypeScript: To-Do List Pro</text>

  <g id="Frontend">
    <rect x="40" y="80" width="220" height="420" class="bg-box" rx="8" />
    <text x="60" y="110" font-family="sans-serif" font-weight="bold" fill="#3182ce">CLIENT SIDE</text>
    
    <rect x="60" y="130" width="180" height="120" fill="#3178c6" rx="5"/>
    <text x="150" y="160" class="box-text" text-anchor="middle">Browser / SPA</text>
    <text x="75" y="190" class="tech-text">React + TypeScript</text>
    <text x="75" y="210" class="tech-text">Tailwind CSS</text>
    <text x="75" y="230" class="tech-text">Axios / Fetch</text>
  </g>

  <g id="Backend">
    <rect x="320" y="80" width="260" height="420" class="bg-box" rx="8" />
    <text x="340" y="110" font-family="sans-serif" font-weight="bold" fill="#38a169">BACKEND SERVER</text>
    
    <rect x="340" y="140" width="220" height="60" fill="#4a5568" rx="5"/>
    <text x="450" y="175" class="box-text" text-anchor="middle">Express.js (API REST)</text>
    
    <rect x="340" y="230" width="220" height="50" fill="#805ad5" rx="5"/>
    <text x="450" y="260" class="box-text" text-anchor="middle">Zod Validation Layer</text>
    
    <rect x="340" y="320" width="220" height="60" fill="#2d3748" rx="5"/>
    <text x="450" y="355" class="box-text" text-anchor="middle">Prisma ORM</text>
    
    <path d="M450 200 L450 230" class="arrow" marker-end="url(#arrowhead)"/>
    <path d="M450 280 L450 320" class="arrow" marker-end="url(#arrowhead)"/>
    <text x="460" y="215" class="label">Middleware</text>
    <text x="460" y="305" class="label">SafeParse</text>
  </g>

  <g id="Database">
    <rect x="640" y="80" width="220" height="420" class="bg-box" rx="8" />
    <text x="660" y="110" font-family="sans-serif" font-weight="bold" fill="#e53e3e">PERSISTENCE LAYER</text>
    
    <rect x="660" y="140" width="180" height="80" fill="#c53030" rx="5"/>
    <text x="750" y="175" class="box-text" text-anchor="middle">Redis (Cache)</text>
    <text x="675" y="200" class="tech-text">Query Caching</text>

    <path d="M660 330 Q660 300 750 300 Q840 300 840 330 L840 430 Q840 460 750 460 Q660 460 660 430 Z" fill="#336791"/>
    <text x="750" y="385" class="box-text" text-anchor="middle">PostgreSQL</text>
    <text x="750" y="405" class="tech-text" text-anchor="middle">Relational Schema</text>
  </g>

  <g id="Connections">
    <path d="M260 190 L320 190" class="arrow" marker-end="url(#arrowhead)"/>
    <text x="265" y="180" class="label">HTTP/JSON</text>
    
    <path d="M560 170 L660 170" class="arrow" marker-end="url(#arrowhead)"/>
    
    <path d="M560 350 L660 350" class="arrow" marker-end="url(#arrowhead)"/>
    <text x="580" y="340" class="label">TCP/SQL</text>
  </g>

  <g id="DevOps">
    <rect x="40" y="520" width="820" height="60" fill="#edf2f7" rx="8" stroke="#cbd5e0"/>
    <text x="450" y="545" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#4a5568">Ecosistema de Desarrollo</text>
    <text x="450" y="565" font-family="monospace" font-size="11" text-anchor="middle" fill="#718096">npm | Git | GitHub Actions | Docker | ESLint | Prettier</text>
  </g>
</svg>